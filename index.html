<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic View Engine</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f0f4ff, #ffffff);
    padding: 20px;
}

h2 { margin-bottom: 15px; }

/* NAV */
.menu-bar {
    display: flex;
    gap: 8px;
    background: white;
    padding: 10px;
    border-radius: 25px;
    width: fit-content;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.menu-bar button {
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    background: transparent;
    cursor: pointer;
}

.menu-bar button.active {
    background: #4f46e5;
    color: white;
}

/* FORM */
.form-area {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
}

input {
    padding: 6px;
    margin-right: 8px;
}

button.add {
    background: #22c55e;
    color: white;
    border: none;
    padding: 6px 12px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th {
    background: #4f46e5;
    color: white;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

/* CARD */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
}

.box {
    background: white;
    padding: 10px;
    border-radius: 10px;
}

/* LIST */
ul {
    background: white;
    padding: 10px;
}
</style>
</head>

<body>

<h2>⚡️ Dynamic View Engine</h2>

<div class="form-area">
    <input type="text" id="inputNama" placeholder="Nama...">
    <button class="add" onclick="addItem()">Tambah</button>
</div>

<div class="menu-bar">
    <button onclick="switchView(this,'table')">Table</button>
    <button onclick="switchView(this,'card')">Card</button>
    <button onclick="switchView(this,'list')">List</button>
    <button onclick="switchView(this,'json')">JSON</button>
</div>

<div id="output"></div>

<script>
// DATA
let items = [
    { id: 1, nama: "Satu" },
    { id: 2, nama: "Dua" },
    { id: 3, nama: "Tiga" }
];

// TEMPLATE (beda nama dari strategy)
const templates = {
    table: (x) => <tr><td>${x.id}</td><td>${x.nama}</td></tr>,
    card: (x) => <div class="box"><b>${x.nama}</b><br>ID: ${x.id}</div>,
    list: (x) => <li>${x.id} - ${x.nama}</li>,
    json: () => <pre>${JSON.stringify(items, null, 2)}</pre>
};

// WRAP
const layouts = {
    table: (c) => <table><tr><th>ID</th><th>Nama</th></tr>${c}</table>,
    card: (c) => <div class="grid">${c}</div>,
    list: (c) => <ul>${c}</ul>,
    json: (c) => c
};

// RENDER
function show(type) {
    let hasil;

    if (type === "json") {
        hasil = templates[type]();
    } else {
        hasil = items.map(i => templates[type](i)).join("");
    }

    document.getElementById("output").innerHTML = layouts[type](hasil);
}

// BUTTON ACTIVE
function switchView(btn, type) {
    document.querySelectorAll(".menu-bar button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    show(type);
}

// ADD
function addItem() {
    const input = document.getElementById("inputNama");
    const val = input.value.trim();

    if (!val) return alert("Isi dulu!");

    const newId = items.length
        ? Math.max(...items.map(i => i.id)) + 1
        : 1;

    items.push({ id: newId, nama: val });
    input.value = "";

    const active = document.querySelector(".menu-bar button.active");
    if (active) active.click();
}

// DEFAULT
show("table");
</script>

</body>
</html>
