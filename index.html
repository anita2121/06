<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Sistem Render Modular</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    button {
      margin-right: 10px;
      padding: 5px 10px;
    }

    table {
      border-collapse: collapse;
      width: 400px;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #000;
      padding: 8px;
      text-align: left;
    }

    .card {
      border: 1px solid black;
      padding: 10px;
      margin: 5px 0;
      width: 200px;
    }
  </style>
</head>
<body>

<h2>Sistem Render Modular</h2>

<button onclick="renderTable()">Render Table</button>
<button onclick="renderCard()">Render Card</button>
<button onclick="renderList()">Render List</button>

<div id="output"></div>

<script>
  // ======================
  // DATA (DRY)
  // ======================
  const data = [
    { id: 1, nama: "Satu" },
    { id: 2, nama: "Dua" },
    { id: 3, nama: "Tiga" }
  ];

  // ======================
  // BASE FUNCTION (REUSE)
  // ======================
  function clearOutput() {
    document.getElementById("output").innerHTML = "";
  }

  // ======================
  // RENDER TABLE
  // ======================
  function renderTable() {
    clearOutput();

    let html = `
      <table>
        <tr>
          <th>ID</th>
          <th>Nama</th>
        </tr>
    `;

    data.forEach(item => {
      html += `
        <tr>
          <td>${item.id}</td>
          <td>${item.nama}</td>
        </tr>
      `;
    });

    html += </table>;

    document.getElementById("output").innerHTML = html;
  }

  // ======================
  // RENDER CARD
  // ======================
  function renderCard() {
    clearOutput();

    let html = "";

    data.forEach(item => {
      html += `
        <div class="card">
          <p><b>ID:</b> ${item.id}</p>
          <p><b>Nama:</b> ${item.nama}</p>
        </div>
      `;
    });

    document.getElementById("output").innerHTML = html;
  }

  // ======================
  // RENDER LIST
  // ======================
  function renderList() {
    clearOutput();

    let html = "<ul>";

    data.forEach(item => {
      html += <li>${item.id} - ${item.nama}</li>;
    });

    html += "</ul>";

    document.getElementById("output").innerHTML = html;
  }

</script>

</body>
</html>
