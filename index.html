<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Latihan DRY</title>
</head>
<body>

<h2>TABLE</h2>
<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nama</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<h2>LIST</h2>
<ul id="list"></ul>

<h2>CARD</h2>
<div id="card"></div>

<h2>MENU</h2>
<div id="menu"></div>

<script>
  // ======================
  // DATA (DRY)
  // ======================
  const data = [
    { id: 1, nama: "satu" },
    { id: 2, nama: "dua" },
    { id: 3, nama: "tiga" }
  ];

  // ======================
  // TABLE
  // ======================
  const tableBody = document.getElementById("tableBody");

  data.forEach(item => {
    tableBody.innerHTML += `
      <tr>
        <td>${item.id}</td>
        <td>${item.nama}</td>
      </tr>
    `;
  });

  // ======================
  // LIST (UL)
  // ======================
  const list = document.getElementById("list");

  data.forEach(item => {
    list.innerHTML += <li>${item.id} - ${item.nama}</li>;
  });

  // ======================
  // CARD (DIV)
  // ======================
  const card = document.getElementById("card");

  data.forEach(item => {
    card.innerHTML += `
      <div style="border:1px solid black; margin:5px; padding:10px;">
        <p>ID: ${item.id}</p>
        <p>Nama: ${item.nama}</p>
      </div>
    `;
  });

  // ======================
  // MENU
  // ======================
  const menu = document.getElementById("menu");

  data.forEach(item => {
    menu.innerHTML += `
      <button>${item.id}. ${item.nama}</button><br>
    `;
  });

</script>

</body>
</html>
